name: CI

on:
  push:
  pull_request:

jobs:
  rust:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo fmt --all -- --check
      - if: runner.os == 'Windows'
        run: cargo test --workspace
      - if: runner.os != 'Windows'
        run: cargo test --workspace --exclude ai-handoff-desktop
      - run: cargo build --release -p ai-handoff-cli --bins
      - if: runner.os == 'Windows'
        shell: pwsh
        run: ./scripts/check-windows-subsystems.ps1 -CliPath target/release/ai-handoff.exe -HostPath target/release/ai-handoff-host.exe

  package:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [20, 22]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node }}
      - run: npm run validate:package
