name: Release

# Builds the ai-handoff CLI per platform and uploads the archives that the
# installers (scripts/install.sh, scripts/install.ps1, Homebrew) download from
# GitHub Releases. Triggered by pushing a version tag, e.g. `git tag v2.0.1 &&
# git push origin v2.0.1`.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build and attach archives to (e.g. v2.0.4)'
        required: true

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target_name: linux-x86_64
            rust_target: x86_64-unknown-linux-gnu
            bin_name: ai-handoff
            ext: tar.gz
          - os: ubuntu-24.04-arm
            target_name: linux-aarch64
            rust_target: aarch64-unknown-linux-gnu
            bin_name: ai-handoff
            ext: tar.gz
          - os: macos-14
            target_name: darwin-aarch64
            rust_target: aarch64-apple-darwin
            bin_name: ai-handoff
            ext: tar.gz
          - os: macos-15-intel
            target_name: darwin-x86_64
            rust_target: x86_64-apple-darwin
            bin_name: ai-handoff
            ext: tar.gz
          - os: windows-latest
            target_name: windows-x86_64
            rust_target: x86_64-pc-windows-msvc
            bin_name: ai-handoff.exe
            ext: zip
          - os: windows-11-arm
            target_name: windows-aarch64
            rust_target: aarch64-pc-windows-msvc
            bin_name: ai-handoff.exe
            ext: zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.tag || github.ref }}
      - uses: dtolnay/rust-toolchain@stable
      - run: rustup target add ${{ matrix.rust_target }}
      - run: cargo build --release -p ai-handoff-cli --target ${{ matrix.rust_target }}

      - name: Package (unix)
        if: runner.os != 'Windows'
        run: |
          artifact="ai-handoff-cli-${{ matrix.target_name }}.${{ matrix.ext }}"
          tar -czf "$artifact" -C target/${{ matrix.rust_target }}/release ${{ matrix.bin_name }}
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "$artifact" > "$artifact.sha256"
          else
            shasum -a 256 "$artifact" > "$artifact.sha256"
          fi
          echo "ARTIFACT=$artifact" >> "$GITHUB_ENV"
          echo "CHECKSUM=$artifact.sha256" >> "$GITHUB_ENV"

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $artifact = "ai-handoff-cli-${{ matrix.target_name }}.${{ matrix.ext }}"
          Compress-Archive -Path "target/${{ matrix.rust_target }}/release/${{ matrix.bin_name }}" -DestinationPath $artifact -Force
          $hash = (Get-FileHash -Path $artifact -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash  $artifact" | Set-Content -Path "$artifact.sha256" -Encoding ascii
          "ARTIFACT=$artifact" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "CHECKSUM=$artifact.sha256" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: |
            ${{ env.ARTIFACT }}
            ${{ env.CHECKSUM }}

  desktop-windows:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target_name: windows-x86_64
            rust_target: x86_64-pc-windows-msvc
            gui_artifact: ai-handoff-gui-windows-x86_64-setup.exe
          - os: windows-11-arm
            target_name: windows-aarch64
            rust_target: aarch64-pc-windows-msvc
            gui_artifact: ai-handoff-gui-windows-aarch64-setup.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.tag || github.ref }}
      - uses: actions/setup-node@v5
        with:
          node-version: 24
      - uses: dtolnay/rust-toolchain@stable
      - run: rustup target add ${{ matrix.rust_target }}
      - run: npm --prefix apps/desktop ci
      - run: npm --prefix apps/desktop run tauri build -- --target ${{ matrix.rust_target }}

      - name: Package Windows GUI
        shell: pwsh
        run: |
          $bundleDir = "target/${{ matrix.rust_target }}/release/bundle/nsis"
          $source = Get-ChildItem -Path $bundleDir -Filter "*-setup.exe" -File | Select-Object -First 1
          if (-not $source) {
            throw "No NSIS setup executable found in $bundleDir"
          }
          $artifact = "${{ matrix.gui_artifact }}"
          Copy-Item -LiteralPath $source.FullName -Destination $artifact -Force
          $hash = (Get-FileHash -Path $artifact -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash  $artifact" | Set-Content -Path "$artifact.sha256" -Encoding ascii
          "ARTIFACT=$artifact" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "CHECKSUM=$artifact.sha256" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Upload GUI to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: |
            ${{ env.ARTIFACT }}
            ${{ env.CHECKSUM }}
