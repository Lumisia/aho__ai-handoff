# ── Account tab ─────────────────────────────────────────────────────────
hint.account_tree:
  en: "↑/↓ move · Enter/→ open account · + add account · q/Esc back"
  ko: "↑/↓ 이동 · Enter/→ 계정 열기 · + 계정 추가하기 · q/Esc 뒤로"
  ja: "↑/↓ 移動 · Enter/→ アカウントを開く · + アカウントを追加 · q/Esc 戻る"
hint.account_detail:
  en: "s switch app · l run CLI · a add · d delete · r refresh credits · ← back"
  ko: "s 앱 전환 · l CLI로 실행 · a 추가 · d 삭제 · r 초기화권 새로고침 · ← 뒤로"
  ja: "s アプリ切替 · l CLIで起動 · a 追加 · d 削除 · r 初期化券更新 · ← 戻る"
account.empty:
  en: "No accounts yet.\n\nPress + to add an account (sign in to Codex or Claude). Add several to manage and switch between them."
  ko: "아직 계정이 없습니다.\n\n+ 를 눌러 계정을 추가하세요 (Codex 또는 Claude 로그인). 여러 개를 추가해 관리·전환할 수 있습니다."
  ja: "まだアカウントがありません。\n\n+ を押してアカウントを追加します（Codex または Claude にサインイン）。複数追加して管理・切替できます。"
account.list_title:
